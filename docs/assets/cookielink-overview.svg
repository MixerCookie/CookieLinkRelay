<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">CookieLink overview</title>
  <desc id="desc">CookieLink desktop app connects through direct audio or CookieLinkRelay with relay statistics, auto latency, and soft limiter protection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10202a"/>
      <stop offset="0.55" stop-color="#17353a"/>
      <stop offset="1" stop-color="#21322f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#37c6a6"/>
      <stop offset="1" stop-color="#f1a340"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="552" rx="22" fill="#f7faf8"/>
  <text x="72" y="88" fill="#10202a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">CookieLink low-latency audio path</text>
  <text x="72" y="124" fill="#55616a" font-family="Inter, Arial, sans-serif" font-size="18">Fixed server address, relay-aware latency, visible congestion, and final output protection.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="184" width="238" height="184" rx="18" fill="#ffffff" stroke="#d8e5e2"/>
    <circle cx="112" cy="228" r="22" fill="#37c6a6"/>
    <text x="146" y="223" fill="#10202a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">CookieLink App</text>
    <text x="146" y="250" fill="#59676f" font-family="Inter, Arial, sans-serif" font-size="14">Standalone / AU / VST3</text>
    <rect x="96" y="286" width="192" height="42" rx="10" fill="#edf7f4" stroke="#b9dfd5"/>
    <text x="112" y="312" fill="#1d5c51" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">server.example.com:11000</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="164" width="260" height="224" rx="18" fill="#ffffff" stroke="#d8e5e2"/>
    <circle cx="512" cy="211" r="22" fill="#f1a340"/>
    <text x="548" y="206" fill="#10202a" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">CookieLinkRelay</text>
    <text x="548" y="233" fill="#59676f" font-family="Inter, Arial, sans-serif" font-size="14">TCP relay + AOO UDP</text>
    <rect x="498" y="274" width="204" height="28" rx="8" fill="#fff4e6"/>
    <text x="516" y="294" fill="#7b4a12" font-family="Inter, Arial, sans-serif" font-size="14">queue budget: 80-150ms</text>
    <rect x="498" y="314" width="204" height="28" rx="8" fill="#eef5ff"/>
    <text x="516" y="334" fill="#315b86" font-family="Inter, Arial, sans-serif" font-size="14">drop old audio frames</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="890" y="184" width="226" height="184" rx="18" fill="#ffffff" stroke="#d8e5e2"/>
    <circle cx="930" cy="228" r="22" fill="#5b5f97"/>
    <text x="964" y="223" fill="#10202a" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Remote peer</text>
    <text x="964" y="250" fill="#59676f" font-family="Inter, Arial, sans-serif" font-size="14">Stereo by default</text>
    <rect x="912" y="286" width="178" height="42" rx="10" fill="#f1f2fb" stroke="#c9cbed"/>
    <text x="935" y="312" fill="#404481" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">clean names, debug IDs</text>
  </g>

  <path d="M320 260 C382 220 420 220 460 248" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <polygon points="460,248 438,238 443,265" fill="#f1a340"/>
  <path d="M740 248 C790 220 832 220 880 260" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <polygon points="880,260 854,254 869,232" fill="#37c6a6"/>

  <g>
    <rect x="196" y="432" width="808" height="48" rx="24" fill="#10202a"/>
    <text x="244" y="462" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">relay stats -> processor/UI -> auto latency -> limiter and clip indicator</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="170" y="512" width="212" height="34" rx="17" fill="#e8f6f1"/>
    <text x="195" y="535" fill="#0f766e" font-size="15" font-weight="700">fixed server address</text>
    <rect x="422" y="512" width="164" height="34" rx="17" fill="#fff2df"/>
    <text x="450" y="535" fill="#9a5a11" font-size="15" font-weight="700">relay budget</text>
    <rect x="626" y="512" width="186" height="34" rx="17" fill="#eaf1ff"/>
    <text x="652" y="535" fill="#315b86" font-size="15" font-weight="700">auto latency</text>
    <rect x="852" y="512" width="176" height="34" rx="17" fill="#f0e8ff"/>
    <text x="878" y="535" fill="#6d28d9" font-size="15" font-weight="700">output guard</text>
  </g>
</svg>
