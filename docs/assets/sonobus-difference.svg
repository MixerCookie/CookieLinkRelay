<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">CookieLink and SonoBus transport difference</title>
  <desc id="desc">SonoBus focuses on peer-to-peer audio after discovery. CookieLink adds a controllable TCP relay path with congestion feedback.</desc>
  <rect width="1200" height="560" rx="28" fill="#111827"/>
  <text x="64" y="76" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Transport philosophy</text>
  <text x="64" y="112" fill="#c7d2df" font-family="Inter, Arial, sans-serif" font-size="18">SonoBus is excellent P2P audio. CookieLink focuses on controlled relay deployment and weak-network behavior.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="64" y="164" width="500" height="298" rx="22" fill="#f8fafc"/>
    <text x="100" y="214" fill="#1f2937" font-size="28" font-weight="700">SonoBus route</text>
    <text x="100" y="248" fill="#64748b" font-size="16">Discovery server helps peers find the group.</text>
    <text x="100" y="272" fill="#64748b" font-size="16">Audio is primarily sent peer-to-peer.</text>
    <circle cx="160" cy="354" r="38" fill="#5b5f97"/>
    <text x="137" y="361" fill="#ffffff" font-size="18" font-weight="700">Peer</text>
    <circle cx="470" cy="354" r="38" fill="#5b5f97"/>
    <text x="447" y="361" fill="#ffffff" font-size="18" font-weight="700">Peer</text>
    <rect x="256" y="302" width="118" height="42" rx="21" fill="#e8eaf8"/>
    <text x="276" y="329" fill="#41457f" font-size="15" font-weight="700">Discovery</text>
    <path d="M200 354 C260 310 370 310 430 354" fill="none" stroke="#5b5f97" stroke-width="7" stroke-linecap="round"/>
    <text x="246" y="404" fill="#1f2937" font-size="16" font-weight="700">direct audio path</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="636" y="164" width="500" height="298" rx="22" fill="#f8fafc"/>
    <text x="672" y="214" fill="#1f2937" font-size="28" font-weight="700">CookieLink route</text>
    <text x="672" y="248" fill="#64748b" font-size="16">A known relay address can be the stable entry point.</text>
    <text x="672" y="272" fill="#64748b" font-size="16">Queue stats feed UI and auto latency decisions.</text>
    <circle cx="732" cy="354" r="38" fill="#37c6a6"/>
    <text x="710" y="361" fill="#073b35" font-size="18" font-weight="700">App</text>
    <circle cx="1042" cy="354" r="38" fill="#37c6a6"/>
    <text x="1020" y="361" fill="#073b35" font-size="18" font-weight="700">App</text>
    <rect x="828" y="318" width="118" height="72" rx="18" fill="#fff0d8" stroke="#f1a340" stroke-width="2"/>
    <text x="853" y="348" fill="#7b4a12" font-size="17" font-weight="700">Relay</text>
    <text x="844" y="372" fill="#7b4a12" font-size="13">stats + queue</text>
    <path d="M770 354 H828" fill="none" stroke="#37c6a6" stroke-width="7" stroke-linecap="round"/>
    <path d="M946 354 H1004" fill="none" stroke="#37c6a6" stroke-width="7" stroke-linecap="round"/>
    <text x="776" y="418" fill="#1f2937" font-size="16" font-weight="700">controlled relay path</text>
  </g>

  <rect x="172" y="494" width="856" height="38" rx="19" fill="#243447"/>
  <text x="215" y="519" fill="#e5edf5" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">CookieLink does not claim to replace SonoBus. It specializes the workflow for fixed servers and relay-heavy networks.</text>
</svg>
